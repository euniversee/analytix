<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#1a1816"/>

  <!-- Bar 1 (short) -->
  <rect x="5" y="20" width="5" height="7" rx="1.5" fill="#a09a94"/>

  <!-- Bar 2 (medium) -->
  <rect x="13" y="14" width="5" height="13" rx="1.5" fill="#d5d0cb"/>

  <!-- Bar 3 (tall) -->
  <rect x="21" y="8" width="5" height="19" rx="1.5" fill="#f5f4f1"/>

  <!-- Trend line (upward) -->
  <polyline points="7.5,19 15.5,12 23.5,6" stroke="#3d6b4f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Trend dot on end -->
  <circle cx="23.5" cy="6" r="1.8" fill="#3d6b4f"/>
</svg>
